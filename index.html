<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sliding Puzzle</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
}

.game-container {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  text-align: center;
}

h1 {
  margin-top: 0;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  font-size: 18px;
}

.puzzle {
  width: 450px;
  height: 450px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 4px;
  margin: 15px 0;
}

.tile {
  background-image: url("image.jpg");
  background-size: 450px 450px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  border-radius: 8px;
}

.empty {
  background: black;
  cursor: default;
  box-shadow: none;
}

button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="game-container">
  <h1>Sliding Puzzle Challenge</h1>

  <div class="stats">
    <span>Moves: <span id="moves">0</span></span>
    <span>Time: <span id="timer">00:00</span></span>
  </div>

  <div class="puzzle" id="puzzle"></div>

  <button onclick="restartGame()">Restart</button>
</div>

<div id="winModal" class="modal hidden">
  <div class="modal-content">
    <h2>🎉 Well Done!</h2>
    <p>You completed the puzzle!</p>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
const size = 3;
let tiles = [];
let moveCount = 0;
let seconds = 0;
let timerInterval;
const movesDisplay = document.getElementById("moves");
const timerDisplay = document.getElementById("timer");

function startTimer() {
  timerInterval = setInterval(() => {
    seconds++;
    let mins = String(Math.floor(seconds / 60)).padStart(2, '0');
    let secs = String(seconds % 60).padStart(2, '0');
    timerDisplay.textContent = mins + ":" + secs;
  }, 1000);
}

function createPuzzle() {
  puzzle.innerHTML = "";
  tiles = [];

  for (let i = 0; i < size * size; i++) {
    tiles.push(i);
  }

  shuffle(tiles);

  tiles.forEach((value, index) => {
    const tile = document.createElement("div");
    tile.classList.add("tile");
    if (value === size * size - 1) {
      tile.classList.add("empty");
    } else {
      const row = Math.floor(value / size);
      const col = value % size;
      tile.style.backgroundPosition =
        (-col * 150) + "px " + (-row * 150) + "px";
    }

    tile.addEventListener("click", () => moveTile(index));
    puzzle.appendChild(tile);
  });

  startTimer();
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function moveTile(index) {
  const emptyIndex = tiles.indexOf(size * size - 1);

  if (isAdjacent(index, emptyIndex)) {
    [tiles[index], tiles[emptyIndex]] =
      [tiles[emptyIndex], tiles[index]];
    moveCount++;
    movesDisplay.textContent = moveCount;
    updatePuzzle();
    checkWin();
  }
}

function isAdjacent(i1, i2) {
  const r1 = Math.floor(i1 / size);
  const c1 = i1 % size;
  const r2 = Math.floor(i2 / size);
  const c2 = i2 % size;
  return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
}

function updatePuzzle() {
  const tileElements = document.querySelectorAll(".tile");

  tiles.forEach((value, index) => {
    const tile = tileElements[index];
    tile.classList.remove("empty");

    if (value === size * size - 1) {
      tile.classList.add("empty");
      tile.style.backgroundPosition = "";
    } else {
      const row = Math.floor(value / size);
      const col = value % size;
      tile.style.backgroundPosition =
        (-col * 150) + "px " + (-row * 150) + "px";
    }
  });
}

function checkWin() {
  for (let i = 0; i < tiles.length; i++) {
    if (tiles[i] !== i) return;
  }
  clearInterval(timerInterval);
  document.getElementById("winModal")
    .classList.remove("hidden");
}

function restartGame() {
  clearInterval(timerInterval);
  moveCount = 0;
  seconds = 0;
  movesDisplay.textContent = "0";
  timerDisplay.textContent = "00:00";
  document.getElementById("winModal")
    .classList.add("hidden");
  createPuzzle();
}

createPuzzle();
</script>

</body>
</html>
